name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  # Pin to the repo's packageManager (pnpm@11.4.0) + the Node it requires.
  # pnpm 11 needs Node >= 22.13 (it imports node:sqlite); the lockfile was
  # generated by pnpm 11, so an older pnpm can't --frozen-lockfile it.
  PNPM_VERSION: 11.4.0
  NODE_VERSION: 22.13.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      MONGODB_URI: mongodb://localhost:27017/nesso_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
