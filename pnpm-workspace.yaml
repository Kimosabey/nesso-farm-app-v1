packages:
  - "apps/*"
  - "packages/*"

# pnpm 10+ requires explicit approval of postinstall build scripts.
# We allow the legit native-binding builds and deny telemetry.
allowBuilds:
  '@firebase/util': true # firebase-admin internal
  '@nestjs/core': true # NestJS bootstrap
  '@scarf/scarf': false # telemetry — denied
  '@sentry-internal/node-cpu-profiler': true # Sentry CPU profiling native binding
  '@sentry/cli': true # downloads sentry-cli binary for sourcemap upload
  bcrypt: true # native crypto binding
  esbuild: true # Next.js dev server / Vitest native binary
  protobufjs: true # firebase-admin / grpc
  sharp: true # Next.js image optimization native binary
  unrs-resolver: true # Turbo / Next.js resolver native binary

# Pin Metro to the version Expo SDK 52 ships with. Newer transitive deps
# (Sentry RN, RN Firebase) try to pull in metro 0.84.x whose `exports` field
# omits `./src/lib/TerminalReporter`, which @expo/cli still requires on
# Node 22+. Pinning avoids that resolution failure at `expo start`.
overrides:
  metro: '0.81.5'
  metro-resolver: '0.81.5'
  metro-config: '0.81.5'
  metro-runtime: '0.81.5'
  metro-source-map: '0.81.5'
  metro-cache: '0.81.5'
  metro-cache-key: '0.81.5'
  metro-core: '0.81.5'
  metro-file-map: '0.81.5'
