<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nesso · Web Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.display { font-family: 'Montserrat', sans-serif; }
input, button, table { font-family: inherit; }

[data-theme="light"] {
  --primary:#0D783C; --primary-2:#207647; --primary-50:#EAF6EE; --primary-300:#5DB683;
  --accent:#F1D412; --secondary:#518E6D; --secondary-d:#3C6B51; --secondary-bg:#EAF3EE;
  --on-primary:#FFFFFF;
  --bg:#F4F8F5; --bg-elevated:#FFFFFF; --bg-muted:#F1F5F2;
  --fg:#0F1A14; --fg-muted:#4A5A52; --fg-subtle:#7A8A82;
  --border:#E2EAE5; --border-strong:#C9D6CE; --ring:#0D783C;
  --glass-bg:rgba(255,255,255,0.72); --glass-border:rgba(13,120,60,0.10);
  --warning:#9A8407; --warning-bg:#FBF5D6; --danger:#B42318; --danger-bg:#FBEAE8; --info-bg:#E0F2F7;
  --shadow-sm:0 1px 3px rgba(13,40,22,0.05), 0 1px 2px rgba(13,40,22,0.03);
  --shadow-md:0 8px 24px -8px rgba(13,40,22,0.14); --shadow-lg:0 24px 50px -12px rgba(13,40,22,0.22);
}
[data-theme="dark"] {
  --primary:#5DB683; --primary-2:#2E8A57; --primary-50:#16271D; --primary-300:#5DB683;
  --accent:#F8E353; --secondary:#7FB496; --secondary-d:#9BCBAD; --secondary-bg:#18271F;
  --on-primary:#06140C;
  --bg:#080F0B; --bg-elevated:#0F1A14; --bg-muted:#152219;
  --fg:#FAFDFA; --fg-muted:#A8B7AE; --fg-subtle:#73837A;
  --border:#1E2C24; --border-strong:#32433A; --ring:#5DB683;
  --glass-bg:rgba(15,26,20,0.66); --glass-border:rgba(93,182,131,0.16);
  --warning:#F8E353; --warning-bg:#2A2810; --danger:#FF6B5B; --danger-bg:#2C1714; --info-bg:#0c2730;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.4); --shadow-md:0 8px 24px -8px rgba(0,0,0,0.6); --shadow-lg:0 24px 50px -12px rgba(0,0,0,0.7);
}
body { background: var(--bg); color: var(--fg); transition: background .4s, color .4s; }

.app { display: flex; height: 100%; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.content { flex: 1; overflow-y: auto; padding: clamp(18px, 3vw, 34px); }
.content-inner { max-width: 1320px; margin: 0 auto; }

/* bento */
.bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: start; }
.bento .c2 { grid-column: span 2; } .bento .c3 { grid-column: span 3; } .bento .c4 { grid-column: span 4; }
.bento .r2 { grid-row: span 2; }
@media (max-width: 1080px) { .bento { grid-template-columns: repeat(2, 1fr); } .bento .c2, .bento .c3, .bento .c4 { grid-column: span 2; } .bento .r2 { grid-row: auto; } }
@media (max-width: 600px) { .bento { grid-template-columns: 1fr; } .bento .c2, .bento .c3, .bento .c4 { grid-column: span 1; } }

/* profile / split layouts */
.profile-grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
@media (max-width: 920px) { .profile-grid { grid-template-columns: 1fr; } }
.split-detail { display: grid; grid-template-columns: 1fr 380px; gap: 16px; align-items: start; }
@media (max-width: 920px) { .split-detail { grid-template-columns: 1fr; } }
.settings-grid { display: grid; }
@media (max-width: 720px) { .settings-grid { grid-template-columns: 1fr !important; } }

/* hovers */
.wbtn:hover { filter: brightness(1.04); transform: translateY(-1px); }
.wbtn:active { transform: translateY(0); }
.wbtn:focus-visible, button:focus-visible, input:focus-visible, a:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
.trow { position: relative; transition: background .14s; }
.trow:hover { background: var(--bg-muted) !important; }
.trow::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--primary); transition: width .16s; }
.trow:hover::after { width: 3px; }
.cmd-item:hover { background: var(--bg-muted); }
.cmd-trigger:hover { border-color: var(--border-strong); }
.hovcard { transition: box-shadow .18s, transform .18s; }
.hovcard:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
@media (max-width: 600px) { .hide-sm { display: none !important; } }

/* aurora login bg */
.aurora-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
.aurora-bg::before, .aurora-bg::after, .aurora-bg i { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); }
.aurora-bg::before { width: 58vw; height: 58vw; top: -20vw; left: -10vw; background: radial-gradient(circle, color-mix(in oklab, var(--primary) 42%, transparent), transparent 70%); animation: a1 19s ease-in-out infinite alternate; }
.aurora-bg::after { width: 48vw; height: 48vw; bottom: -20vw; right: -10vw; background: radial-gradient(circle, color-mix(in oklab, var(--accent) 30%, transparent), transparent 70%); animation: a2 24s ease-in-out infinite alternate; }
.aurora-bg i { width: 42vw; height: 42vw; top: 24vh; left: 36vw; background: radial-gradient(circle, color-mix(in oklab, var(--secondary) 38%, transparent), transparent 70%); opacity: .55; animation: a3 28s ease-in-out infinite alternate; }
@keyframes a1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(60px,40px) scale(1.12)} }
@keyframes a2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-50px,-30px) scale(1.1)} }
@keyframes a3 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(40px,-36px) scale(1.16)} }
@keyframes cmdIn { from { transform: translateY(-12px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 3px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="web/web_ui.jsx"></script>
<script type="text/babel" src="web/web_landing.jsx"></script>
<script type="text/babel" src="web/web_viz.jsx"></script>
<script type="text/babel" src="web/web_pages.jsx"></script>
<script type="text/babel" src="web/web_pages2.jsx"></script>
<script type="text/babel" src="web/web_pages3.jsx"></script>
<script type="text/babel" src="web/web_pages4.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const LS = { get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } }, set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} } };

const CRUMBS = {
  dashboard: ['Nesso', 'Dashboard'], approvals: ['Nesso', 'Approvals'],
  farmers: ['Nesso', 'Farmers'], farmer: ['Nesso', 'Farmers', 'Lakshmi Gowda'],
  farms: ['Nesso', 'Farms'], farm: ['Nesso', 'Farms', 'North Plot'],
  activities: ['Nesso', 'Activities'], activity: ['Nesso', 'Activities', 'ACT-1192'],
  preharvest: ['Nesso', 'Pre-harvest'], quality: ['Nesso', 'Quality'],
  samples: ['Nesso', 'Quality', 'Samples'], audits: ['Nesso', 'Quality', 'Audits'],
  procurement: ['Nesso', 'Procurement'], warehouses: ['Nesso', 'Inventory', 'Warehouses'],
  inventory: ['Nesso', 'Inventory'], batch: ['Nesso', 'Inventory', 'BATCH-TBR-0291'],
  qrgen: ['Nesso', 'Inventory', 'QR generator'], reports: ['Nesso', 'Reports'],
  notifications: ['Nesso', 'Notifications'], settings: ['Nesso', 'Settings'],
  'err403': ['Nesso', '403'], 'err404': ['Nesso', '404'], 'err500': ['Nesso', '500'],
};

function WebApp() {
  const [theme, setTheme] = useState(() => LS.get('nessoweb.theme', 'light'));
  const [authed, setAuthed] = useState(() => LS.get('nessoweb.authed', false));
  const [gate, setGate] = useState(() => LS.get('nessoweb.gate', 'landing'));
  const [route, setRoute] = useState(() => LS.get('nessoweb.route', 'dashboard'));
  const [collapsed, setCollapsed] = useState(false);
  const [cmd, setCmd] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); LS.set('nessoweb.theme', theme); }, [theme]);
  useEffect(() => LS.set('nessoweb.authed', authed), [authed]);
  useEffect(() => LS.set('nessoweb.gate', gate), [gate]);
  useEffect(() => LS.set('nessoweb.route', route), [route]);
  useEffect(() => {
    const onResize = () => setCollapsed(window.innerWidth < 1024);
    onResize(); window.addEventListener('resize', onResize); return () => window.removeEventListener('resize', onResize);
  }, []);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmd(c => !c); }
      if (e.key === 'Escape') setCmd(false);
    };
    window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey);
  }, []);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  const nav = (id) => { if (id === 'new') { setRoute('farmer'); return; } setRoute(id); };
  const toast = (msg, kind = 'success') => { setToastMsg({ msg, kind, key: Date.now() }); };
  const logout = () => { setAuthed(false); setGate('landing'); setRoute('dashboard'); };

  if (!authed) {
    if (gate === 'landing') return <LandingPage theme={theme} onToggleTheme={toggleTheme} onSignIn={() => setGate('login')} />;
    return <LoginPage theme={theme} onToggleTheme={toggleTheme} onLogin={() => setAuthed(true)} onBack={() => setGate('landing')} />;
  }

  let page;
  if (route === 'dashboard') page = <DashboardPage />;
  else if (route === 'approvals') page = <ApprovalsPage onOpen={() => setRoute('farmer')} onToast={toast} />;
  else if (route === 'farmers') page = <FarmersPage onOpen={() => setRoute('farmer')} />;
  else if (route === 'farmer') page = <FarmerProfilePage onNav={nav} />;
  else if (route === 'farms') page = <FarmsListShim onOpen={() => setRoute('farm')} />;
  else if (route === 'farm') page = <FarmPage />;
  else if (route === 'activities') page = <ActivitiesPage onOpen={() => setRoute('activity')} />;
  else if (route === 'activity') page = <ActivityDetailPage />;
  else if (route === 'preharvest') page = <PreHarvestWebPage />;
  else if (route === 'quality' || route === 'samples' || route === 'audits') page = <QualityPage onToast={toast} />;
  else if (route === 'procurement') page = <ProcurementPage onToast={toast} />;
  else if (route === 'warehouses') page = <WarehousesPage onToast={toast} />;
  else if (route === 'inventory') page = <InventoryLedgerPage onOpen={() => setRoute('batch')} />;
  else if (route === 'batch') page = <BatchPage />;
  else if (route === 'qrgen') page = <QrGenPage onToast={toast} />;
  else if (route === 'reports') page = <ReportsPage />;
  else if (route === 'notifications') page = <NotificationsPage />;
  else if (route === 'settings') page = <SettingsPage theme={theme} onToast={toast} />;
  else if (route === 'err403') page = <SystemPage code="403" onHome={() => setRoute('dashboard')} />;
  else if (route === 'err404') page = <SystemPage code="404" onHome={() => setRoute('dashboard')} />;
  else if (route === 'err500') page = <SystemPage code="500" onHome={() => setRoute('dashboard')} />;
  else page = <ComingSoon route={route} />;

  return (
    <div className="app">
      <Sidebar route={route} onNav={nav} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)} />
      <div className="main">
        <Topbar theme={theme} onToggleTheme={toggleTheme} onOpenCmd={() => setCmd(true)} crumbs={CRUMBS[route] || ['Nesso']} onBell={() => setRoute('notifications')} onNav={nav} onLogout={logout} />
        <div className="content"><div className="content-inner">{page}</div></div>
      </div>
      <CommandPalette open={cmd} onClose={() => setCmd(false)} onNav={nav} />
      {toastMsg && <WToast msg={toastMsg.msg} kind={toastMsg.kind} onDone={() => setToastMsg(null)} key={toastMsg.key} />}
    </div>
  );
}

/* light shims so sidebar items all resolve to something polished */
function FarmsListShim({ onOpen }) {
  return (
    <div>
      <PageHeader title="Farms" sub="942 mapped · 1,184 ha total" actions={<><WBtn kind="outline" icon="filter">Table · Map</WBtn><WBtn kind="primary" icon="plus">Add farm</WBtn></>} />
      <div className="bento">
        {[['North Plot','Channarayapatna','Tuberose','1.2'],['Belur Estate','Belur','Marigold','2.4'],['Patil Field A','Sakleshpur','Jasmine','0.8'],['Rao Garden','Hassan','Jasmine','0.9']].map((f,i)=>(
          <WCard key={i} className="c2 hovcard" pad={0} style={{overflow:'hidden',cursor:'pointer'}}>
            <div onClick={onOpen}>
              <div style={{height:150}}><MiniMap height="150px"/></div>
              <div style={{padding:16}}>
                <div style={{fontSize:15,fontWeight:600,color:'var(--fg)'}}>{f[0]}</div>
                <div style={{fontSize:12.5,color:'var(--fg-muted)',marginTop:3}}>{f[1]}</div>
                <div style={{display:'flex',gap:7,marginTop:10}}><span style={{fontSize:11.5,fontWeight:600,color:'var(--secondary-d)',background:'var(--secondary-bg)',padding:'3px 9px',borderRadius:999}}>{f[2]}</span><span className="mono" style={{fontSize:11.5,fontWeight:600,color:'var(--fg-muted)',background:'var(--bg-muted)',padding:'3px 9px',borderRadius:999}}>{f[3]} ha</span></div>
              </div>
            </div>
          </WCard>
        ))}
      </div>
    </div>
  );
}
function InventoryShim({ onOpen }) {
  return (
    <div>
      <PageHeader title="Inventory" sub="Batches & stage movements" actions={<WBtn kind="primary" icon="qr">Scan GRN</WBtn>} />
      <WCard pad={0} style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',minWidth:640}}>
          <thead><tr style={{background:'var(--bg-muted)'}}>{['Batch','Crop','Qty','Supplier','Status',''].map(h=><th key={h} style={{textAlign:'left',padding:'12px 14px',fontSize:11.5,fontWeight:700,color:'var(--fg-subtle)',textTransform:'uppercase',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{[['BATCH-TBR-0291','Tuberose · A','320 kg','Belur FPO','processing'],['BATCH-JAS-0288','Jasmine · A','180 kg','Hassan FPO','approved'],['BATCH-MAR-0285','Marigold · B','540 kg','Alur Agent','approved']].map((r,i)=>(
            <tr key={i} className="trow" onClick={onOpen} style={{cursor:'pointer',borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'13px 14px'}}><span className="mono" style={{fontSize:13.5,fontWeight:600,color:'var(--fg)'}}>{r[0]}</span></td>
              <td style={{padding:'13px 14px',fontSize:13.5,color:'var(--fg-muted)'}}>{r[1]}</td>
              <td style={{padding:'13px 14px',fontFamily:'JetBrains Mono',fontSize:13.5,fontWeight:600,color:'var(--fg)'}}>{r[2]}</td>
              <td style={{padding:'13px 14px',fontSize:13.5,color:'var(--fg-muted)'}}>{r[3]}</td>
              <td style={{padding:'13px 14px'}}><StatusPill kind={r[4]}>{r[4]==='processing'?'In storage':'Stored'}</StatusPill></td>
              <td style={{padding:'13px 14px'}}><WIcon name="chevR" size={17} color="var(--fg-subtle)"/></td>
            </tr>
          ))}</tbody>
        </table></div>
      </WCard>
    </div>
  );
}
function ComingSoon({ route }) {
  return (
    <div>
      <PageHeader title={route[0].toUpperCase()+route.slice(1)} sub="Same design system, applied per module" />
      <WCard style={{textAlign:'center',padding:'64px 20px'}}>
        <svg viewBox="0 0 160 120" width="160" style={{marginBottom:16}} aria-hidden="true"><defs><linearGradient id="cs" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="var(--primary-300)"/><stop offset="1" stopColor="var(--primary)"/></linearGradient></defs><circle cx="120" cy="34" r="20" fill="var(--accent)" opacity="0.85"/><rect x="22" y="64" width="116" height="14" rx="7" fill="url(#cs)"/><rect x="22" y="86" width="80" height="14" rx="7" fill="var(--secondary)" opacity="0.6"/></svg>
        <h3 className="display" style={{fontSize:19,fontWeight:700,color:'var(--fg)'}}>{route[0].toUpperCase()+route.slice(1)} — next in the rollout</h3>
        <p style={{fontSize:14.5,color:'var(--fg-muted)',marginTop:8,maxWidth:'42ch',marginInline:'auto'}}>The 7 hero pages define the language; this module reuses the same shell, tables, and tokens.</p>
      </WCard>
    </div>
  );
}

Object.assign(window, { FarmsListShim, InventoryShim, ComingSoon });
ReactDOM.createRoot(document.getElementById('root')).render(<WebApp />);
</script>
</body>
</html>
